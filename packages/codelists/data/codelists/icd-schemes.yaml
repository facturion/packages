name: ICD / EAS schemes
bucket: icdSchemes
description: >
  ISO/IEC 6523 ICD codes (a.k.a. PEPPOL EAS list). Used wherever EN 16931
  expects a "scheme identifier" beside an issuer identifier (BT-34 buyer
  electronic address, BT-29 / BT-46 party identifier, BT-30 / BT-47 legal
  registration, BT-157 item standard ID). Curated subset weighted toward
  codes seen on EU B2B and B2G invoices; the form accepts free input for
  anything outside the list.
order: numeric by code (4-digit, zero-padded — string sort matches numeric here)
authority: ISO/IEC 6523 + PEPPOL EAS
upstream:
  peppol: https://github.com/OpenPEPPOL/peppol-codelists
  iso: https://www.iso.org/standard/14409.html
last_synced: 2026-05-19
entries:
  - code: "0002"
    country: "FR"
    label: { en: "System Information et Repertoire des Entreprise et des Etablissements: SIRENE", de: "System Information et Repertoire des Entreprise et des Etablissements: SIRENE" }
    hint:
      en: 9-digit French legal-entity identifier (SIREN). Use SIRET (0009) when the establishment-level suffix matters.
      de: 9-stellige französische Kennung der juristischen Person (SIREN). Für die etablissementbezogene Variante SIRET (0009) wählen.
  - code: "0007"
    country: "SE"
    label: { en: "Organisationsnummer (SE)", de: "Organisationsnummer (SE)" }
  - code: "0009"
    country: "FR"
    label: { en: "SIRET (FR)", de: "SIRET (FR)" }
    preferred: true
    hint:
      en: 14-digit French establishment identifier (SIREN + 5-digit suffix). Identifies a specific site, not just the legal entity.
      de: 14-stellige französische Etablissement-Kennung (SIREN + 5-stelliger Zusatz). Identifiziert einen konkreten Standort, nicht nur die juristische Person.
  - code: "0037"
