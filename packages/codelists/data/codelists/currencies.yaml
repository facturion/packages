name: Currencies
bucket: currencies
description: >
  ISO 4217 currency codes. Curated subset covering EUR, the major reserve
  currencies, Nordics, and CEE markets we see on invoices today. Free-text
  input is still accepted upstream — this is the picker, not an enum.
order: preferred (10 reserve / Nordics / CEE) first; rest alphabetical by code
authority: ISO 4217
upstream:
  iso: https://www.iso.org/iso-4217-currency-codes.html
  cldr: https://github.com/unicode-org/cldr-json
last_synced: 2026-06-14
