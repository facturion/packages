name: Countries
bucket: countries
description: >
  ISO 3166-1 alpha-2 country codes. Localized display names sourced from
  Unicode CLDR (permissive, Unicode-3.0) — refresh with `npm run sync -- --relabel`.
order: YAML order is not user-facing — codelistOptions(_, sort:"label") sorts at display time using the active locale's collation (Ö interleaves O in DE, sorts after Z in EN).
authority: ISO 3166-1
upstream:
  iso: https://www.iso.org/iso-3166-country-codes.html
  cldr: https://github.com/unicode-org/cldr-json
last_synced: 2026-06-14
